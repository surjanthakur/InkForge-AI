services:
  backend:
    platform: linux/amd64
    build:
      context: ./backend
      dockerfile: dockerfile
    env_file:
      - ./backend/.env
    container_name: ez-write-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  postgres:
    image: postgres:16-alpine
    env_file:
      - ./backend/.env
    container_name: ez-write-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    env_file:
      - ./backend/.env
    container_name: ez-write-redis
    restart: unless-stopped
    command: ["sh", "-c", 'redis-server --requirepass "$$REDIS_PASSWORD"']
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", 'redis-cli -a "$$REDIS_PASSWORD" ping']
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres_data:
